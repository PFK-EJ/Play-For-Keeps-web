<!-- Page metadata. PFK is a single-page React app that boots client-side via
     Babel-standalone, which means crawlers (Twitter, iMessage, Slack, Google,
     ChatGPT, Perplexity) only see this raw HTML — they don't run JS. So
     everything they need to summarize the site has to live here as static
     tags. Without them, link previews show a bare URL with no card. -->
<meta name="description" content="A free toolkit for dynasty fantasy football managers — Sleeper Snapshot, Dispersal Draft live picker, Trade Finder, Rookie Ranks, and Trade Polls."/>
<link rel="canonical" href="https://playforkeepsdynasty.com/"/>

<meta property="og:site_name" content="Play For Keeps"/>

<meta property="og:description" content="A free toolkit for dynasty fantasy football managers — Sleeper Snapshot, Dispersal Draft live picker, Trade Finder, Rookie Ranks, and Trade Polls."/>

<!-- JSON-LD WebApplication schema — helps Google Search Console + AI
     crawlers (ChatGPT, Perplexity, Gemini) understand what this site IS,
     not just what it says. Invisible to humans. -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebApplication",
  "name": "Play For Keeps",
  "alternateName": "PFK",
  "url": "https://playforkeepsdynasty.com/",
  "description": "A free toolkit for dynasty fantasy football managers — Sleeper Snapshot, Dispersal Draft live picker, Trade Finder, Rookie Ranks, and Trade Polls.",
  "applicationCategory": "SportsApplication",
  "operatingSystem": "Any (web)",
  "offers": {
    "@type": "Offer",
    "price": "0",
    "priceCurrency": "USD"
  },
  "creator": {
    "@type": "Organization",
    "name": "Play For Keeps",
    "url": "https://playforkeepsdynasty.com/",
    "sameAs": ["https://x.com/PlayForKeepsFF"]
  }
}
</script>

<body>
<!-- Pre-render content for crawlers + AI scrapers that don't execute JS.
     React replaces #root immediately on page load, so users never see this —
     but Google, ChatGPT, Perplexity, and link-preview bots that ignore
     JavaScript will read this and learn what the site actually is. -->
<div id="root">
  <noscript>
    <h1>Play For Keeps — Dynasty Fantasy Football Tools</h1>
    <p>Play For Keeps is a free toolkit for dynasty fantasy football managers. Tools available:</p>
    <ul>
      <li><strong>Sleeper Snapshot</strong> — look up any Sleeper user and see their account age, dynasty leagues, trade activity, championship history, and roster value rank.</li>
      <li><strong>Dispersal Draft</strong> — pool teams from a Sleeper league and run a live, mobile-friendly snake draft for orphans.</li>
      <li><strong>Trade Finder</strong> — type any rookie pick or player and see every equivalent-value asset grouped by position.</li>
      <li><strong>Rookie Ranks</strong> — PFK's official 2026 dynasty rookie rankings, plus a custom-list builder.</li>
      <li><strong>Trade Polls</strong> — create a dynasty trade poll, share the link, and get votes from the community.</li>
    </ul>
    <p>Free, no signup required for most tools. Visit <a href="https://playforkeepsdynasty.com/">playforkeepsdynasty.com</a> in any modern browser.</p>
  </noscript>
</div>
<script type="text/babel" src="/js/app.js?v=20260502j"></script>
